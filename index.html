const SUPABASE_URL = "https://koetobzvkdohtmckugov.supabase.co;
const SUPABASE_ANON_KEY = "sb_publishable_uhoJre1bAFZEbnZlCV05Lg_CO9Ta77J";

// ── Mini cliente Supabase (sem npm) ──────────────────────────────
const sbHeaders = (token) => ({
  "Content-Type": "application/json",
  "apikey": SUPABASE_ANON_KEY,
  ...(token ? { "Authorization": `Bearer ${token}` } : {}),
});

let _session = null;
const _listeners = [];

const sb = {
  // Auth
  auth: {
    getSession: async () => {
      const stored = localStorage.getItem("sb-session");
      if (stored) { _session = JSON.parse(stored); return { data: { session: _session } }; }
      return { data: { session: null } };
    },
    signInWithPassword: async ({ email, password }) => {
setSessionFromUrl: async () => {
  const hash = window.location.hash.startsWith("#")
    ? window.location.hash.slice(1)
    : "";
  const params = new URLSearchParams(hash);

  const access_token = params.get("access_token");
  const refresh_token = params.get("refresh_token");
  const type = params.get("type");
  const error = params.get("error");
  const error_description = params.get("error_description");

  if (error) {
    return {
      data: null,
      error: { message: decodeURIComponent(error_description || error) }
    };
  }

  if (!access_token || !refresh_token) {
    return { data: { session: null, type: null }, error: null };
  }

  const session = {
    access_token,
    refresh_token,
    token_type: params.get("token_type") || "bearer",
    expires_in: Number(params.get("expires_in") || 3600),
    expires_at: Math.floor(Date.now() / 1000) + Number(params.get("expires_in") || 3600),
    user: null
  };

  _session = session;
  localStorage.setItem("sb-session", JSON.stringify(session));
  _listeners.forEach(fn => fn("SIGNED_IN", _session));

  // limpa os tokens da URL
  window.history.replaceState({}, document.title, window.location.pathname + window.location.search);

  return { data: { session, type }, error: null };
},

updateUser: async ({ password }) => {
  if (!_session?.access_token) {
    return { data: null, error: { message: "Sessão inválida para redefinir senha." } };
  }

  const r = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${_session.access_token}`
    },
    body: JSON.stringify({ password })
  });

  const data = await r.json();

  if (!r.ok) {
    return { data: null, error: { message: data.msg || data.error_description || data.error || "Erro ao atualizar senha" } };
  }

  return { data, error: null };
},
    signOut: async () => {
      _session = null;
      localStorage.removeItem("sb-session");
      _listeners.forEach(fn => fn("SIGNED_OUT", null));
    },
    onAuthStateChange: (fn) => { _listeners.push(fn); return { data: { subscription: { unsubscribe: () => {} } } }; },
    inviteUserByEmail: async (email) => {
      // Requer service role — use a Edge Function ou chame pelo CLI
      console.warn("inviteUserByEmail requer service role key. Use o Dashboard ou uma Edge Function.");
      return { error: null };
    },
  },

  // DB
  from: (table) => new QueryBuilder(table),

  // Realtime (polling simples — substitua por @supabase/supabase-js para WebSockets reais)
  channel: (name) => ({
    on: function(event, filter, cb) { this._cb = cb; this._filter = filter; return this; },
    subscribe: function() {
      // Polling a cada 8s como fallback; use o SDK oficial para WebSockets
      this._interval = setInterval(async () => {
        if (!_session) return;
        const r = await fetch(
          `${SUPABASE_URL}/rest/v1/${this._filter?.table}?select=*&order=updated_at.desc&limit=1`,
          { headers: sbHeaders(_session?.access_token) }
        );
        if (r.ok) { const d = await r.json(); if (d[0]) this._cb?.({ eventType: "UPDATE", new: d[0] }); }
      }, 8000);
      return this;
    },
    _unsubscribe: function() { clearInterval(this._interval); },
  }),
  removeChannel: (ch) => ch?._unsubscribe?.(),
};

class QueryBuilder {
  constructor(table) {
    this._table = table; this._filters = []; this._sel = "*";
    this._order = null; this._limit = null; this._single = false;
    this._method = "GET"; this._body = null; this._upsert = false;
  }
  select(cols) { this._sel = cols || "*"; return this; }
  eq(col, val) { this._filters.push(`${col}=eq.${val}`); return this; }
  is(col, val) { this._filters.push(`${col}=is.${val}`); return this; }
  order(col, { ascending = true } = {}) { this._order = `${col}.${ascending ? "asc" : "desc"}`; return this; }
  limit(n) { this._limit = n; return this; }
  single() { this._single = true; return this; }
  insert(body) { this._method = "POST"; this._body = body; return this; }
  update(body) { this._method = "PATCH"; this._body = body; return this; }
  upsert(body) { this._method = "POST"; this._body = body; this._upsert = true; return this; }
  delete() { this._method = "DELETE"; return this; }

  async then(resolve, reject) {
    try {
      const token = _session?.access_token;
      let url = `${SUPABASE_URL}/rest/v1/${this._table}`;
      const params = [];
      if (this._method === "GET" || this._method === "DELETE" || this._method === "PATCH") {
        params.push(`select=${encodeURIComponent(this._sel)}`);
        this._filters.forEach(f => params.push(f));
        if (this._order) params.push(`order=${this._order}`);
        if (this._limit) params.push(`limit=${this._limit}`);
      }
      if (params.length) url += "?" + params.join("&");

      const hdrs = {
        ...sbHeaders(token),
        "Prefer": this._single
          ? "return=representation,count=exact"
          : (this._method !== "GET" ? "return=representation" : ""),
      };
      if (this._upsert) hdrs["Prefer"] = "resolution=merge-duplicates,return=representation";

      const res = await fetch(url, {
        method: this._method,
        headers: hdrs,
        body: this._body ? JSON.stringify(this._body) : undefined,
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ message: res.statusText }));
        return resolve({ data: null, error: err });
      }

      if (res.status === 204) return resolve({ data: null, error: null });

      const json = await res.json();
      const data = this._single ? (Array.isArray(json) ? json[0] : json) : json;
      return resolve({ data, error: null });
    } catch (e) {
      return resolve({ data: null, error: { message: e.message } });
    }
  }
}

// 🔧 UTILITÁRIOS
// ══════════════════════════════════════════════════════════════════
const uuid = () => crypto.randomUUID?.() || Math.random().toString(36).slice(2);

function calcDeadline(created, priority, sla) {
  if (!created) return "";
  const d = new Date(created + "T00:00:00");
  d.setDate(d.getDate() + (sla[priority] || 10));
  return d.toISOString().slice(0, 10);
}

function getSlaInfo(task, sla) {
  if (task.column === "concluido") return { status:"done", label:"Concluída", color:"#00B894", days:0 };
  const dl = task.deadline;
  if (!dl) return { status:"none", label:"", color:"#6B7280", days:0 };
  const now = new Date(); now.setHours(0,0,0,0);
  const end = new Date(dl + "T00:00:00");
  const diff = Math.ceil((end - now) / 86400000);
  if (diff < 0) return { status:"late",  label:`Atrasada ${Math.abs(diff)}d`, color:"#FF4757", days:diff };
  if (diff === 0) return { status:"today", label:"Vence hoje",             color:"#FFA502", days:0  };
  if (diff <= 2) return { status:"soon",  label:`Vence em ${diff}d`,       color:"#FFA502", days:diff };
  return { status:"ok", label:`${diff}d restantes`, color:"#00B894", days:diff };
}

// ── Componentes de UI reutilizáveis ──────────────────────────────
function SlaTag({ task, sla, small }) {
  const info = getSlaInfo(task, sla);
  if (info.status === "none") return null;
  const ico = { late:"🔴", today:"🟡", soon:"🟡", done:"✅", ok:"🟢" }[info.status] || "🟢";
  return (
    <span title={info.label} style={{ fontSize: small?9:10, color:info.color, fontWeight:700, whiteSpace:"nowrap", display:"flex", alignItems:"center", gap:2 }}>
      {ico} {!small && info.label}
    </span>
  );
}

function Av({ m, mbs, sz=28 }) {
  if (!m) return null;
  const x = mbs.find(a => a.id === m);
  if (!x) return null;
  return (
    <div title={x.name} style={{ width:sz, height:sz, borderRadius:"50%", background:x.color, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:sz*0.4, fontWeight:700, flexShrink:0 }}>
      {x.initials}
    </div>
  );
}

function Bg({ c, cls }) {
  const x = cls.find(a => a.id === c || a.id === c?.id);
  if (!x) return null;
  return (
    <span style={{ background:x.color+"22", color:x.color, fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:4, letterSpacing:"0.04em", textTransform:"uppercase", border:"1px solid "+x.color+"33", whiteSpace:"nowrap" }}>
      {x.name}
    </span>
  );
}

function Pd({ pid }) {
  const p = PRIORITIES.find(x => x.id === pid);
  if (!p) return null;
  return <span title={p.name} style={{ fontSize:13, color:p.color, filter:"saturate(1.5)" }}>{p.icon}</span>;
}

// ══════════════════════════════════════════════════════════════════
// 🔐 TELA DE LOGIN
// ══════════════════════════════════════════════════════════════════
function LoginScreen({ t }) {
  const [email, setEmail] = useState("");
  const [pass,  setPass]  = useState("");
  const [err,   setErr]   = useState("");
  const [loading, setLoading] = useState(false);

  const iS = { padding:"11px 14px", borderRadius:8, border:"1px solid "+t.brd, background:t.inp, color:t.text, fontSize:13, outline:"none", width:"100%", transition:"border-color .15s" };

  const login = async () => {
    if (!email || !pass) { setErr("Preencha e-mail e senha."); return; }
    setLoading(true); setErr("");
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { setErr(error.message); setLoading(false); }
  };

  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", background:t.bg, fontFamily:"'DM Sans',sans-serif" }}>
      <div className="fade-in" style={{ background:t.card, borderRadius:16, padding:"32px 28px", width:"100%", maxWidth:380, boxShadow:"0 24px 48px rgba(0,0,0,0.2)" }}>
        <img src={LOGO} alt="GlobalCad" style={{ height:38, objectFit:"contain", marginBottom:8 }}/>
        <div style={{ fontSize:10, color:t.mut, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:28 }}>Gestão de Tarefas</div>
        <h2 style={{ color:t.text, margin:"0 0 6px", fontSize:20, fontWeight:800 }}>Bem-vindo</h2>
        <p style={{ color:t.mut, fontSize:13, margin:"0 0 24px" }}>Entre com sua conta para continuar</p>

        {err && (
          <div style={{ color:"#FF4757", fontSize:12, marginBottom:14, padding:"10px 12px", background:"#FF475711", borderRadius:8, border:"1px solid #FF475733" }}>
            ⚠️ {err}
          </div>
        )}

        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com" style={iS}
            onFocus={e=>e.target.style.borderColor="#0984E3"} onBlur={e=>e.target.style.borderColor=t.brd}/>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&login()} placeholder="Senha" style={iS}
            onFocus={e=>e.target.style.borderColor="#0984E3"} onBlur={e=>e.target.style.borderColor=t.brd}/>
          <button onClick={login} disabled={loading}
            style={{ padding:12, borderRadius:8, background: loading?"#0984E388":"#0984E3", color:"#fff", border:"none", fontSize:14, fontWeight:700, cursor: loading?"not-allowed":"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8, transition:"background .15s" }}>
            {loading ? <><span className="spin">⟳</span> Entrando...</> : "Entrar →"}
          </button>
        </div>

        <p style={{ color:t.mut, fontSize:11, marginTop:20, textAlign:"center" }}>
          Acesso restrito a usuários autorizados.<br/>Solicite acesso ao administrador.
        </p>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// 🃏 CARD DE TAREFA
// ══════════════════════════════════════════════════════════════════
function Card({ task, onEdit, cls, mbs, t, sla, taskTypes }) {
  const p = PRIORITIES.find(x => x.id === task.priority);
  const si = getSlaInfo(task, sla);
  const borderColor = si.status === "late" ? "#FF4757" : (p?.color || "#ddd");
  const tt = taskTypes.find(x => x.id === task.task_type);

  return (
    <div draggable onDragStart={e => e.dataTransfer.setData("tid", task.id)} onClick={() => onEdit(task)}
      className="fade-in"
      style={{ background:t.card, borderRadius:8, padding:"12px 14px", cursor:"grab", borderLeft:"3px solid "+borderColor,
        boxShadow: si.status==="late" ? "0 0 0 1px #FF475733,0 1px 3px rgba(0,0,0,0.06)" : "0 1px 3px rgba(0,0,0,0.06)",
        transition:"all .15s", display:"flex", flexDirection:"column", gap:8 }}
      onMouseEnter={e => { e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,0.14)"; e.currentTarget.style.transform="translateY(-1px)"; }}
      onMouseLeave={e => { e.currentTarget.style.boxShadow= si.status==="late" ? "0 0 0 1px #FF475733,0 1px 3px rgba(0,0,0,0.06)" : "0 1px 3px rgba(0,0,0,0.06)"; e.currentTarget.style.transform="none"; }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:6 }}>
        <Bg c={task.client_id || task.client} cls={cls}/><Pd pid={task.priority}/>
      </div>
      {tt && <div style={{ fontSize:10, color:t.mut, fontWeight:600 }}>{tt.icon} {tt.name}</div>}
      <div style={{ fontSize:13, fontWeight:600, color:t.text, lineHeight:1.35 }}>{task.title}</div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <span style={{ fontSize:10, color:t.mut, fontFamily:"monospace" }}>
            {task.created_at ? task.created_at.slice(0,10) : task.created || ""}
          </span>
          {task.attachments?.length > 0 && <span style={{ fontSize:10, color:t.mut }}>📎{task.attachments.length}</span>}
          <SlaTag task={task} sla={sla} small/>
        </div>
        <Av m={task.assignee_id || task.assignee} mbs={mbs} sz={22}/>
      </div>
    </div>
  );
}

// 📊 COLUNA KANBAN

function Col({ col, tasks, onEdit, onDrop, cls, mbs, t, sla, taskTypes }) {
  const [ov, setOv] = useState(false);
  return (
    <div onDragOver={e=>{e.preventDefault();setOv(true);}} onDragLeave={()=>setOv(false)}
      onDrop={e=>{e.preventDefault();setOv(false);onDrop(e.dataTransfer.getData("tid"),col.id);}}
      style={{ flex:"1 1 260px", minWidth:260, maxWidth:340, display:"flex", flexDirection:"column",
        background:ov?t.colH:t.colBg, borderRadius:12, transition:"background .2s" }}>
      <div style={{ padding:"14px 14px 10px", display:"flex", alignItems:"center", gap:8, borderBottom:"2px solid "+col.accent+"44" }}>
        <span style={{ fontSize:14, color:col.accent }}>{col.icon}</span>
        <span style={{ fontWeight:800, fontSize:12, color:t.text, letterSpacing:"0.03em", textTransform:"uppercase" }}>{col.name}</span>
        <span style={{ marginLeft:"auto", background:col.accent+"22", color:col.accent, fontSize:11, fontWeight:800, padding:"2px 8px", borderRadius:10 }}>{tasks.length}</span>
      </div>

      </div>
    </div>
  );
}

// 📝 MODAL DE TAREFA (criar / editar)
// ══════════════════════════════════════════════════════════════════
function TaskModal({ task, onSave, onDel, onClose, cls, mbs, t, onNC, sla, taskTypes, currentUser }) {
  const isNew = !task.id;
  const today = new Date().toISOString().slice(0,10);

  const [f, sF] = useState({
    title: "", description: "", column: "pendente",
    client_id: cls[0]?.id || "", priority: "media",
    assignee_id: currentUser?.id || "",
    requester_id: currentUser?.id || "",
    task_type: "", deadline: calcDeadline(today, "media", sla),
    ...task,
    // normaliza campos legados
    client_id: task.client_id || task.client || cls[0]?.id || "",
    assignee_id: task.assignee_id || task.assignee || currentUser?.id || "",
    requester_id: task.requester_id || task.requester || currentUser?.id || "",
    task_type: task.task_type || task.taskType || "",
  });

  const [history, setHistory]     = useState([]);
  const [snc, setSnc]             = useState(false);
  const [saving, setSaving]       = useState(false);
  const [nc, setNc]               = useState({ name:"", color: PCOLORS[Math.floor(Math.random()*PCOLORS.length)] });
  const fileRef = useRef(null);

  useEffect(() => {
    if (task.id) {
      sb.from("task_history").select("*")
        .eq("task_id", task.id).order("created_at", { ascending: false }).limit(10)
        .then(({ data }) => setHistory(data || []));
    }
  }, [task.id]);

  const set = (k, v) => sF(p => {
    const nf = { ...p, [k]: v };
    if ((k==="priority" || k==="created_at") && nf.created_at)
      nf.deadline = calcDeadline(nf.created_at?.slice(0,10), nf.priority, sla);
    return nf;
  });

  const handleSave = async () => {
    if (!f.title.trim()) return;
    setSaving(true);
    await onSave(f);
    setSaving(false);
    onClose();
  };

  const addClient = () => {
    if (!nc.name.trim()) return;
    const c = { id: nc.name.toLowerCase().replace(/\s+/g,"_"), name:nc.name.trim(), color:nc.color };
    onNC(c);
    set("client_id", c.id);
    setSnc(false);
  };

  const iS = { padding:"10px 12px", borderRadius:8, border:"1px solid "+t.brd, background:t.inp, color:t.text, fontSize:13, outline:"none", fontFamily:"inherit", width:"100%", boxSizing:"border-box", transition:"border-color .15s" };
  const bS = { padding:"8px 18px", borderRadius:8, border:"none", fontSize:13, cursor:"pointer", fontFamily:"inherit" };
  const fieldLabels = { column:"Status", priority:"Prioridade", assignee_id:"Responsável", deadline:"Prazo" };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:999, display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(4px)", padding:16 }}>
      <div className="fade-in" style={{ background:t.card, borderRadius:16, padding:24, width:"100%", maxWidth:500, maxHeight:"92vh", overflowY:"auto", boxShadow:"0 24px 48px rgba(0,0,0,0.25)" }}>
        <h3 style={{ margin:"0 0 18px", fontSize:16, fontWeight:800, color:t.text }}>{isNew ? "Nova Tarefa" : "Editar Tarefa"}</h3>

        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          {/* Título */}
          <input value={f.title} onChange={e=>set("title",e.target.value)} placeholder="Título da tarefa" style={iS}
            onFocus={e=>e.target.style.borderColor="#0984E3"} onBlur={e=>e.target.style.borderColor=t.brd}/>

          {/* Descrição */}
          <div>
            <label style={{ fontSize:11, fontWeight:700, color:t.mut, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:4, display:"block" }}>Descrição</label>
            <textarea value={f.description||""} onChange={e=>set("description",e.target.value)}
              placeholder="Descreva a tarefa..." rows={3}
              style={{...iS, resize:"vertical", minHeight:60}}/>
          </div>

          {/* Cliente */}
          <div>
            <label style={{ fontSize:11, fontWeight:700, color:t.mut, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:4, display:"block" }}>Cliente</label>
            <div style={{ display:"flex", gap:8 }}>
              <select value={f.client_id||""} onChange={e=>set("client_id",e.target.value)} style={{...iS,flex:1}}>
                <option value="">Selecione...</option>
                {cls.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              <button onClick={()=>setSnc(!snc)} style={{...bS, background:t.colBg, color:t.mut, fontSize:18, padding:"6px 12px", border:"1px solid "+t.brd}} title="Novo cliente">+</button>
            </div>
            {snc && (
              <div style={{ marginTop:8, padding:12, background:t.colBg, borderRadius:8, display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
                <input value={nc.name} onChange={e=>setNc(p=>({...p,name:e.target.value}))} placeholder="Nome do cliente" style={{...iS,flex:"1 1 120px"}}/>
                <input type="color" value={nc.color} onChange={e=>setNc(p=>({...p,color:e.target.value}))} style={{ width:36, height:36, borderRadius:8, border:"none", cursor:"pointer", padding:0 }}/>
                <button onClick={addClient} style={{...bS, background:"#0984E3", color:"#fff", fontWeight:700}}>Adicionar</button>
              </div>
            )}
          </div>

          {/* Prioridade + Solicitante */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <div>
              <label style={{ fontSize:11, fontWeight:700, color:t.mut, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:4, display:"block" }}>Prioridade</label>
              <select value={f.priority} onChange={e=>set("priority",e.target.value)} style={iS}>
                {PRIORITIES.map(p=><option key={p.id} value={p.id}>{p.icon} {p.name}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize:11, fontWeight:700, color:t.mut, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:4, display:"block" }}>Solicitante</label>
              <select value={f.requester_id||""} onChange={e=>set("requester_id",e.target.value)} style={iS}>
                <option value="">Selecione...</option>
                {mbs.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
              </select>
            </div>
          </div>

          {/* Responsável + Prazo */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <div>
              <label style={{ fontSize:11, fontWeight:700, color:t.mut, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:4, display:"block" }}>Responsável</label>
              <select value={f.assignee_id||""} onChange={e=>set("assignee_id",e.target.value)} style={iS}>
                <option value="">Selecione...</option>
                {mbs.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize:11, fontWeight:700, color:t.mut, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:4, display:"block" }}>Prazo (SLA)</label>
              <input type="date" value={f.deadline||""} onChange={e=>sF(p=>({...p,deadline:e.target.value}))} style={iS}/>
              {f.deadline && <div style={{ marginTop:4 }}><SlaTag task={f} sla={sla}/></div>}
            </div>
          </div>

          {/* Tipo de tarefa */}
          <div>
            <label style={{ fontSize:11, fontWeight:700, color:t.mut, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6, display:"block" }}>Tipo de Tarefa</label>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              {taskTypes.map(tt => (
                <button key={tt.id} onClick={()=>set("task_type", f.task_type===tt.id ? "" : tt.id)}
                  style={{ padding:"7px 12px", borderRadius:8, border:"2px solid "+(f.task_type===tt.id?"#0984E3":t.brd),
                    background:f.task_type===tt.id?"#0984E322":t.inp, color:f.task_type===tt.id?"#0984E3":t.text,
                    fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit",
                    display:"flex", alignItems:"center", gap:5, transition:"all .15s" }}>
                  <span style={{fontSize:14}}>{tt.icon}</span> {tt.name}
                </button>
              ))}
            </div>
          </div>

          {/* Status */}
          <div>
            <label style={{ fontSize:11, fontWeight:700, color:t.mut, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:4, display:"block" }}>Status</label>
            <select value={f.column} onChange={e=>set("column",e.target.value)} style={iS}>
              {COLUMNS.map(c=><option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
            </select>
          </div>

          {/* Histórico */}
          {history.length > 0 && (
            <div>
              <label style={{ fontSize:11, fontWeight:700, color:t.mut, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6, display:"block" }}>📋 Histórico de alterações</label>
              <div style={{ display:"flex", flexDirection:"column", gap:3, maxHeight:130, overflowY:"auto" }}>
                {history.map(h => (
                  <div key={h.id} style={{ fontSize:11, color:t.mut, display:"flex", gap:8, padding:"5px 8px", background:t.colBg, borderRadius:6, alignItems:"center" }}>
                    <span style={{ color:t.text, fontWeight:600, flexShrink:0 }}>{fieldLabels[h.field] || h.field}</span>
                    <span style={{ flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{h.old_value||"—"} → <strong style={{color:t.text}}>{h.new_value||"—"}</strong></span>
                    <span style={{ marginLeft:"auto", fontFamily:"monospace", fontSize:10, flexShrink:0 }}>
                      {h.created_at ? new Date(h.created_at).toLocaleDateString("pt-BR") : ""}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Ações */}
        <div style={{ display:"flex", gap:10, marginTop:20, justifyContent:"flex-end", flexWrap:"wrap" }}>
          {!isNew && <button onClick={()=>{onDel(task.id);onClose();}} style={{...bS,background:"#FF767533",color:"#D63031"}}>Excluir</button>}
          <button onClick={onClose} style={{...bS,background:t.colBg,color:t.mut}}>Cancelar</button>
          <button onClick={handleSave} disabled={saving}
            style={{...bS,background:saving?"#0984E388":"#0984E3",color:"#fff",fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
            {saving ? <><span className="spin">⟳</span> Salvando...</> : "Salvar"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ⚙️  MODAL DE CONFIGURAÇÕES
// ══════════════════════════════════════════════════════════════════
function SettingsModal({ onClose, cls, setCls, mbs, setMbs, taskTypes, setTaskTypes, t, currentUser }) {
  const isAdmin = currentUser?.role === "admin";
  const isManager = currentUser?.role === "manager" || isAdmin;
  const tabs = [
    { id:"clients",   label:"🏢 Clientes",         show: true },
    { id:"members",   label:"👤 Equipe",            show: true },
    { id:"tasktypes", label:"📋 Tipos de Tarefa",   show: true },
    { id:"users",     label:"🔐 Usuários",          show: isAdmin },
  ].filter(tb => tb.show);

  const [tab,    setTab]    = useState("clients");
  const [editCl, setEditCl] = useState(null);
  const [newCl,  setNewCl]  = useState({ name:"", color: PCOLORS[0] });
  const [editMb, setEditMb] = useState(null);
  const [newMb,  setNewMb]  = useState({ name:"", initials:"", color: PCOLORS[1] });
  const [editTt, setEditTt] = useState(null);
  const [newTt,  setNewTt]  = useState({ name:"", icon:"📋" });
  const [invEmail, setInvEmail] = useState("");
  const [invMsg,   setInvMsg]   = useState("");

  const iS = { padding:"8px 10px", borderRadius:6, border:"1px solid "+t.brd, background:t.inp, color:t.text, fontSize:12, outline:"none", fontFamily:"inherit", width:"100%", boxSizing:"border-box" };
  const bS = (bg, cl) => ({ padding:"6px 14px", borderRadius:6, border:"none", fontSize:12, cursor:"pointer", fontFamily:"inherit", background:bg, color:cl, fontWeight:700 });
  const Row = ({ children }) => <div style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 10px", background:t.colBg, borderRadius:8, marginBottom:6 }}>{children}</div>;

  // Clients
  const saveCl = async (item) => {
    if (!item.name.trim()) return;
    const id = item.id || item.name.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
    const payload = { id, name: item.name.trim(), color: item.color };
    await sb.from("clients").upsert(payload);
    if (item._new) setCls(p => [...p, payload]);
    else setCls(p => p.map(x => x.id === item.id ? payload : x));
    setEditCl(null);
    setNewCl({ name:"", color: PCOLORS[Math.floor(Math.random()*PCOLORS.length)] });
  };
  const delCl = async (id) => {
    if (!window.confirm("Excluir este cliente?")) return;
    await sb.from("clients").delete().eq("id", id);
    setCls(p => p.filter(x => x.id !== id));
  };

  // Members
  const saveMb = async (item) => {
    if (!item.name.trim()) return;
    const payload = { id: item.id, name: item.name.trim(), initials: (item.initials||"").toUpperCase().slice(0,2), color: item.color, role: item.role || "member" };
    await sb.from("profiles").update(payload).eq("id", item.id);
    setMbs(p => p.map(x => x.id === item.id ? { ...x, ...payload } : x));
    setEditMb(null);
  };

  // Task types
  const saveTt = async (item) => {
    if (!item.name.trim()) return;
    const id = item.id || item.name.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
    const payload = { id, name: item.name.trim(), icon: item.icon || "📋" };
    await sb.from("task_types").upsert(payload);
    if (item._new) setTaskTypes(p => [...p, payload]);
    else setTaskTypes(p => p.map(x => x.id === item.id ? payload : x));
    setEditTt(null);
    setNewTt({ name:"", icon:"📋" });
  };
  const delTt = async (id) => {
    if (!window.confirm("Excluir este tipo de tarefa?")) return;
    await sb.from("task_types").delete().eq("id", id);
    setTaskTypes(p => p.filter(x => x.id !== id));
  };

  const updateRole = async (userId, role) => {
    await sb.from("profiles").update({ role }).eq("id", userId);
    setMbs(p => p.map(x => x.id === userId ? { ...x, role } : x));
  };

  const sendInvite = async () => {
    if (!invEmail.trim()) return;
    setInvMsg("⏳ Enviando convite...");
    // Na prática, use a Admin API do Supabase via Edge Function
    // Por ora, apenas exibe instrução
    setInvMsg(`✅ Para convidar ${invEmail}, use o Dashboard do Supabase: Authentication → Users → Invite user`);
    setInvEmail("");
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(4px)", padding:16 }}>

function Filters({ filters, setF, cls, mbs, t, tasks, sla }) {
  const s = { padding:"6px 10px", borderRadius:8, border:"1px solid "+t.brd, background:t.inp, color:t.text, fontSize:12, outline:"none", fontFamily:"inherit", minWidth:0, flex:"1 1 100px" };
  const usedCls = cls.filter(c => tasks.some(tk => (tk.client_id||tk.client)===c.id));
  const usedPri = PRIORITIES.filter(p => tasks.some(tk => tk.priority===p.id));
  const usedMbs = mbs.filter(m => tasks.some(tk => (tk.assignee_id||tk.assignee)===m.id));
  const activeCols = filters.cols || COLUMNS.map(c=>c.id);

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
        <span style={{ fontSize:11, fontWeight:700, color:t.mut, textTransform:"uppercase", letterSpacing:"0.06em", whiteSpace:"nowrap" }}>Filtros:</span>
        <select value={filters.client} onChange={e=>setF(p=>({...p,client:e.target.value}))} style={s}>
          <option value="">Todos clientes</option>
          {usedCls.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <select value={filters.priority} onChange={e=>setF(p=>({...p,priority:e.target.value}))} style={s}>
          <option value="">Todas prioridades</option>
          {usedPri.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <select value={filters.assignee} onChange={e=>setF(p=>({...p,assignee:e.target.value}))} style={s}>
          <option value="">Todos responsáveis</option>
          {usedMbs.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
        </select>
        <select value={filters.sla||""} onChange={e=>setF(p=>({...p,sla:e.target.value}))} style={{...s,flex:"1 1 110px"}}>
          <option value="">SLA: Todos</option>
          <option value="ok">🟢 No prazo</option>
          <option value="soon">🟡 Vence em breve</option>
          <option value="late">🔴 Atrasadas</option>
        </select>
        <input value={filters.search} onChange={e=>setF(p=>({...p,search:e.target.value}))} placeholder="Buscar..." style={{...s,flex:"1 1 140px"}}/>
      </div>
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
        <span style={{ fontSize:11, fontWeight:700, color:t.mut, textTransform:"uppercase", letterSpacing:"0.06em", whiteSpace:"nowrap" }}>Colunas:</span>
        {COLUMNS.map(col => {
          const active = activeCols.includes(col.id);
          const count = tasks.filter(tk=>tk.column===col.id).length;
          return (
            <label key={col.id} onClick={()=>setF(p=>{const cur=p.cols||COLUMNS.map(c=>c.id);return {...p,cols:cur.includes(col.id)?cur.filter(x=>x!==col.id):[...cur,col.id]};})}
              style={{ display:"flex", alignItems:"center", gap:5, cursor:"pointer", padding:"4px 10px", borderRadius:6,
                background:active?col.accent+"22":"transparent", border:"1px solid "+(active?col.accent+"55":t.brd),
                transition:"all .15s", userSelect:"none" }}>
              <span style={{ width:14, height:14, borderRadius:3, border:"2px solid "+(active?col.accent:t.mut),
                background:active?col.accent:"transparent", display:"flex", alignItems:"center",
                justifyContent:"center", fontSize:10, color:"#fff", transition:"all .15s" }}>{active?"✓":""}</span>
              <span style={{ fontSize:11, fontWeight:600, color:active?col.accent:t.mut }}>{col.icon} {col.name}</span>
              <span style={{ fontSize:10, color:t.mut }}>({count})</span>
            </label>
          );
        })}
      </div>
    </div>
  );
}

function ResetPasswordScreen({ t, onDone }) {
  const [pass1, setPass1] = useState("");
  const [pass2, setPass2] = useState("");
  const [err, setErr] = useState("");
  const [ok, setOk] = useState("");
  const [loading, setLoading] = useState(false);

  const iS = {
    padding: "11px 14px",
    borderRadius: 8,
    border: "1px solid " + t.brd,
    background: t.inp,
    color: t.text,
    fontSize: 13,
    outline: "none",
    width: "100%"
  };

  const save = async () => {
    setErr("");
    setOk("");

    if (!pass1 || !pass2) {
      setErr("Preencha a nova senha e a confirmação.");
      return;
    }

    if (pass1 !== pass2) {
      setErr("As senhas não coincidem.");
      return;
    }

    if (pass1.length < 6) {
      setErr("Use pelo menos 6 caracteres.");
      return;
    }

    setLoading(true);
    const { error } = await sb.auth.updateUser({ password: pass1 });
    setLoading(false);

    if (error) {
      setErr(error.message);
      return;
    }

    setOk("Senha atualizada com sucesso. Entre com a nova senha.");
    setTimeout(() => onDone?.(), 1200);
  };

  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", background:t.bg, fontFamily:"'DM Sans',sans-serif" }}>
      <div className="fade-in" style={{ background:t.card, borderRadius:16, padding:"32px 28px", width:"100%", maxWidth:380, boxShadow:"0 24px 48px rgba(0,0,0,0.2)" }}>
        <img src={LOGO} alt="GlobalCad" style={{ height:38, objectFit:"contain", marginBottom:8 }}/>
        <div style={{ fontSize:10, color:t.mut, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:28 }}>Redefinir senha</div>

        {err && (
          <div style={{ color:"#FF4757", fontSize:12, marginBottom:14, padding:"10px 12px", background:"#FF475711", borderRadius:8, border:"1px solid #FF475733" }}>
            ⚠️ {err}
          </div>
        )}

        {ok && (
          <div style={{ color:"#00B894", fontSize:12, marginBottom:14, padding:"10px 12px", background:"#00B89411", borderRadius:8, border:"1px solid #00B89433" }}>
            ✅ {ok}
          </div>
        )}

        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <input type="password" value={pass1} onChange={e=>setPass1(e.target.value)} placeholder="Nova senha" style={iS} />
          <input type="password" value={pass2} onChange={e=>setPass2(e.target.value)} placeholder="Confirmar nova senha" style={iS}
            onKeyDown={e=>e.key==="Enter"&&save()} />
          <button onClick={save} disabled={loading}
            style={{ padding:12, borderRadius:8, background: loading?"#0984E388":"#0984E3", color:"#fff", border:"none", fontSize:14, fontWeight:700, cursor: loading?"not-allowed":"pointer" }}>
            {loading ? "Salvando..." : "Salvar nova senha"}
          </button>
        </div>
      </div>
    </div>
  );
}
  function App() {
  const [recoveryMode, setRecoveryMode] = useState(false);
  const [session, setSession]       = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [currentUser, setCurrentUser] = useState(null);

  const [tasks,     setTasks]     = useState([]);
  const [cls,       setCls]       = useState([]);
  const [mbs,       setMbs]       = useState([]);
  const [taskTypes, setTaskTypes] = useState([]);
  const [sla,       setSla]       = useState({ baixa:30, media:10, importante:5, urgente:2 });
  const [loaded,    setLoaded]    = useState(false);

  const [mdl,          setMdl]          = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showSla,      setShowSla]      = useState(false);
  const [flt,          setFlt]          = useState({ client:"", priority:"", assignee:"", search:"", sla:"", cols:COLUMNS.map(c=>c.id) });
  const [view,         setView]         = useState("kanban");
  const [theme,        setTheme]        = useState(() => localStorage.getItem("gc-theme") || "dark");

  const t = TH[theme];

  // ── Autenticação ─────────────────────────────────────────────
  useEffect(() => {
  async function initAuth() {
    const { data, error } = await sb.auth.setSessionFromUrl();

    if (error) {
      console.error("Erro no link de autenticação:", error.message);
    }

    if (data?.type === "recovery") {
      setRecoveryMode(true);
      setSession(data.session);
      setAuthLoading(false);
      return;
    }

    const { data: sessionData } = await sb.auth.getSession();
    setSession(sessionData.session);
    setAuthLoading(false);
  }

  initAuth();

  sb.auth.onAuthStateChange((event, session) => {
    setSession(session);
    if (!session) {
      setCurrentUser(null);
      setLoaded(false);
      setTasks([]);
    }
  });
}, []);

  // ── Carregamento dos dados ────────────────────────────────────
  useEffect(() => {
    if (!session) return;

    async function loadAll() {
      const token = session.access_token;
      const [
        { data: tk },
        { data: cl },
        { data: mb },
        { data: tt },
        { data: sl },
      ] = await Promise.all([
        sb.from("tasks").select("*, attachments:task_attachments(*)").order("created_at", { ascending: false }),
        sb.from("clients").select("*").order("name"),
        sb.from("profiles").select("*").order("name"),
        sb.from("task_types").select("*").order("name"),
        sb.from("sla_config").select("*"),
      ]);

      if (tk) setTasks(tk);
      if (cl) setCls(cl);
      if (mb) {
        setMbs(mb);
        const me = mb.find(x => x.id === session.user?.id);
        if (me) setCurrentUser(me);
      }
      if (tt) setTaskTypes(tt);
      if (sl) setSla(Object.fromEntries(sl.map(x => [x.priority, x.days])));
      setLoaded(true);
    }

    loadAll();

    // Polling leve para sincronização (substitua pelo SDK @supabase/supabase-js para Realtime via WebSocket)
    const ch = sb.channel("tasks-poll");
    ch.on("postgres_changes", { event:"*", schema:"public", table:"tasks" }, (payload) => {
      if (payload.eventType==="UPDATE") setTasks(p => p.map(x => x.id===payload.new.id ? { ...x, ...payload.new } : x));
      if (payload.eventType==="INSERT") setTasks(p => [payload.new, ...p]);
      if (payload.eventType==="DELETE") setTasks(p => p.filter(x => x.id!==payload.old?.id));
    }).subscribe();

    return () => sb.removeChannel(ch);
  }, [session]);

  // Persistir tema
  useEffect(() => { localStorage.setItem("gc-theme", theme); }, [theme]);

  // ── Ações de tarefa ──────────────────────────────────────────
  const today = () => new Date().toISOString().slice(0,10);

  const hSave = async (f) => {
    const payload = {
      title:        f.title,
      description:  f.description || "",
      column:       f.column,
      client_id:    f.client_id || f.client || null,
      priority:     f.priority,
      assignee_id:  f.assignee_id || f.assignee || null,
      requester_id: f.requester_id || f.requester || null,
      task_type:    f.task_type || f.taskType || null,
      deadline:     f.deadline || null,
    };

    if (f.id) {
      const { data } = await sb.from("tasks").update(payload).eq("id", f.id).select().single();
      if (data) setTasks(p => p.map(x => x.id === f.id ? { ...x, ...data } : x));
    } else {
      const { data } = await sb.from("tasks").insert(payload).select().single();
      if (data) setTasks(p => [data, ...p]);
    }
  };

  const hDrop = async (tid, col) => {
    setTasks(p => p.map(x => x.id===tid ? {...x, column:col} : x)); // otimista
    await sb.from("tasks").update({ column: col }).eq("id", tid);
    // O trigger do banco registra o histórico e enfileira o e-mail automaticamente
  };

  const hDel = async (id) => {
    setTasks(p => p.filter(x => x.id !== id));
    await sb.from("tasks").delete().eq("id", id);
  };

  const hNC = async (c) => {
    await sb.from("clients").upsert({ id:c.id, name:c.name, color:c.color });
    setCls(p => [...p.filter(x=>x.id!==c.id), c]);
  };

  // ── Filtragem ────────────────────────────────────────────────
  const activeCols = flt.cols || COLUMNS.map(c=>c.id);
  const filtered = useMemo(() => tasks.filter(x => {
    if (!activeCols.includes(x.column)) return false;
    const cid = x.client_id || x.client;
    if (flt.client   && cid !== flt.client)                           return false;
    if (flt.priority && x.priority !== flt.priority)                  return false;
    const aid = x.assignee_id || x.assignee;
    if (flt.assignee && aid !== flt.assignee)                         return false;
    if (flt.search   && !x.title.toLowerCase().includes(flt.search.toLowerCase())) return false;
    if (flt.sla) {
      const si = getSlaInfo(x, sla);
      if (flt.sla==="late" && si.status!=="late")                     return false;
      if (flt.sla==="soon" && si.status!=="today" && si.status!=="soon") return false;
      if (flt.sla==="ok"   && si.status!=="ok")                       return false;
    }
    return true;
  }), [tasks, flt, sla, activeCols]);

  const lateCount = tasks.filter(x => getSlaInfo(x,sla).status==="late").length;

  const nT = () => {
    const td = today();
    setMdl({ title:"", column:"pendente", client_id: cls[0]?.id||"", priority:"media",
      assignee_id: currentUser?.id||"", requester_id: currentUser?.id||"",
      description:"", deadline: calcDeadline(td,"media",sla), task_type:"" });
  };

  const bS = { padding:"8px 18px", borderRadius:8, border:"none", fontSize:13, cursor:"pointer", fontFamily:"inherit" };

  // ── Guarda de autenticação ───────────────────────────────────
  if (authLoading) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", background: theme==="dark"?"#0F1117":"#F3F4F6", color: theme==="dark"?"#E8E9ED":"#111827", fontFamily:"'DM Sans',sans-serif" }}>
      <span className="spin" style={{fontSize:28}}>⟳</span>
    </div>
  );
  if (recoveryMode) {
  return <ResetPasswordScreen t={t} onDone={() => {
    setRecoveryMode(false);
    sb.auth.signOut();
  }} />;
}
  if (!session) return <LoginScreen t={t}/>;

  if (!loaded) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", background:t.bg, color:t.text, fontFamily:"'DM Sans',sans-serif", gap:10 }}>
      <span className="spin" style={{fontSize:20}}>⟳</span>
      <span style={{fontSize:14,color:t.mut}}>Carregando dados...</span>
    </div>
  );

  // ── Render principal ─────────────────────────────────────────
  return (
    <div style={{ fontFamily:"'DM Sans','Segoe UI',sans-serif", background:t.bg, minHeight:"100vh", color:t.text }}>

      {/* NAVBAR */}
      <div style={{ padding:"10px 16px", borderBottom:"1px solid "+t.brd, background:t.navBg, display:"flex", alignItems:"center", gap:12, flexWrap:"wrap", position:"sticky", top:0, zIndex:100 }}>
        <img src={LOGO} alt="GlobalCad" style={{ height:34, objectFit:"contain" }}/>
        <div style={{ fontSize:10, color:t.mut, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.08em", borderLeft:"1px solid "+t.brd, paddingLeft:12 }}>
          Gestão de Tarefas
        </div>

        {lateCount > 0 && (
          <span onClick={()=>setFlt(p=>({...p,sla:"late"}))}
            style={{ background:"#FF475722", color:"#FF4757", fontSize:11, fontWeight:700, padding:"4px 10px", borderRadius:20, cursor:"pointer", animation:"fadeIn .3s ease" }}>
            🔴 {lateCount} atrasada{lateCount>1?"s":""}
          </span>
        )}

        <div style={{ marginLeft:"auto", display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
          <button onClick={()=>setShowSla(!showSla)} style={{...bS,padding:"6px 11px",background:t.colBg,color:t.mut,fontSize:11,fontWeight:700,border:"1px solid "+t.brd}} title="Configurar SLA">⏱ SLA</button>
          <button onClick={()=>setTheme(theme==="dark"?"light":"dark")} style={{...bS,padding:"6px 11px",background:t.colBg,color:t.mut,fontSize:16}} title="Tema">{theme==="dark"?"☀":"🌙"}</button>
          <button onClick={()=>setShowSettings(true)} style={{...bS,padding:"6px 11px",background:t.colBg,color:t.mut,fontSize:14}} title="Configurações">⚙️</button>
          {["kanban","table"].map(v => (
            <button key={v} onClick={()=>setView(v)} style={{...bS,padding:"6px 12px",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",background:view===v?"#0984E3":t.colBg,color:view===v?"#fff":t.mut}}>
              {v==="kanban"?"⊞ Quadro":"☰ Grade"}
            </button>
          ))}
          <button onClick={nT} style={{...bS,padding:"8px 14px",background:"#0984E3",color:"#fff",fontWeight:700,fontSize:12}}>+ Nova Tarefa</button>

          {/* Avatar do usuário logado */}
          <div style={{ display:"flex", alignItems:"center", gap:8, paddingLeft:8, borderLeft:"1px solid "+t.brd }}>
            <Av m={currentUser?.id} mbs={mbs} sz={30}/>
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:t.text, lineHeight:1.2 }}>{currentUser?.name||"Você"}</div>
              <div style={{ fontSize:10, color:t.mut, lineHeight:1 }}>{ROLE_LABELS[currentUser?.role]||"Membro"}</div>
            </div>
            <button onClick={()=>sb.auth.signOut()} title="Sair" style={{...bS,padding:"4px 8px",background:t.colBg,color:t.mut,fontSize:11,border:"1px solid "+t.brd}}>Sair</button>
          </div>
        </div>
      </div>

      {/* SLA CONFIG */}
      {showSla && (
        <div style={{ padding:"12px 16px", borderBottom:"1px solid "+t.brd, background:t.colBg }}>
          <div style={{ display:"flex", gap:16, alignItems:"center", flexWrap:"wrap" }}>
            <span style={{ fontSize:11, fontWeight:700, color:t.mut, textTransform:"uppercase", letterSpacing:"0.06em" }}>SLA (dias):</span>
            {PRIORITIES.map(p => (
              <div key={p.id} style={{ display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ fontSize:12, color:p.color, fontWeight:600 }}>{p.icon} {p.name}</span>
                <input type="number" min={1} value={sla[p.id]||""} onChange={e=>setSla(s=>({...s,[p.id]:parseInt(e.target.value)||0}))}
                  style={{ padding:"6px 10px", borderRadius:8, border:"1px solid "+t.brd, background:t.inp, color:t.text, fontSize:13, outline:"none", fontFamily:"inherit", width:60, textAlign:"center" }}/>
                <span style={{ fontSize:10, color:t.mut }}>dias</span>
              </div>
            ))}
            <button onClick={async()=>{
              await Promise.all(PRIORITIES.map(p=>sb.from("sla_config").update({days:sla[p.id]}).eq("priority",p.id)));
              setShowSla(false);
            }} style={{...bS,padding:"6px 14px",background:"#0984E3",color:"#fff",fontWeight:700,fontSize:12}}>Salvar</button>
            <button onClick={()=>setShowSla(false)} style={{...bS,padding:"4px 12px",background:t.card,color:t.mut,fontSize:11}}>Fechar</button>
          </div>
        </div>
      )}

      {/* FILTROS */}
      <div style={{ padding:"10px 16px" }}>
        <Filters filters={flt} setF={setFlt} cls={cls} mbs={mbs} t={t} tasks={tasks} sla={sla}/>
      </div>

      {/* BOARD / TABLE */}
      {view==="kanban" ? (
        <div style={{ padding:"0 16px 80px", display:"flex", gap:10, overflowX:"auto" }}>
          {COLUMNS.filter(col=>activeCols.includes(col.id)).map(col => (
            <Col key={col.id} col={col} tasks={filtered.filter(x=>x.column===col.id)}
              onEdit={setMdl} onDrop={hDrop} cls={cls} mbs={mbs} t={t} sla={sla} taskTypes={taskTypes}/>
          ))}
        </div>
      ) : (
        <div style={{ padding:"0 16px 80px", overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead>
              <tr style={{ borderBottom:"2px solid "+t.brd }}>
                {["Tarefa","Tipo","Cliente","Status","Prioridade","Prazo","SLA","Responsável"].map(h => (
                  <th key={h} style={{ padding:"10px 12px", textAlign:"left", fontWeight:800, fontSize:11, color:t.mut, textTransform:"uppercase", letterSpacing:"0.06em" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map(tk => {
                const col = COLUMNS.find(c=>c.id===tk.column);
                const tt  = taskTypes.find(x=>x.id===tk.task_type);
                const dl  = tk.deadline || calcDeadline(tk.created_at?.slice(0,10)||"", tk.priority, sla);
                return (
                  <tr key={tk.id} onClick={()=>setMdl(tk)} style={{ borderBottom:"1px solid "+t.brd, cursor:"pointer", transition:"background .1s" }}
                    onMouseEnter={e=>e.currentTarget.style.background=t.colBg}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <td style={{ padding:"10px 12px", fontWeight:600 }}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        {tk.title}
                        {tk.attachments?.length>0 && <span style={{fontSize:11,color:t.mut}}>📎{tk.attachments.length}</span>}
                      </div>
                    </td>
                    <td style={{ padding:"10px 12px", fontSize:11, color:t.mut }}>{tt ? `${tt.icon} ${tt.name}` : "—"}</td>
                    <td style={{ padding:"10px 12px" }}><Bg c={tk.client_id||tk.client} cls={cls}/></td>
                    <td style={{ padding:"10px 12px" }}><span style={{color:col?.accent,fontSize:12,fontWeight:600}}>{col?.icon} {col?.name}</span></td>
                    <td style={{ padding:"10px 12px" }}><Pd pid={tk.priority}/> {PRIORITIES.find(p=>p.id===tk.priority)?.name}</td>
                    <td style={{ padding:"10px 12px", fontFamily:"monospace", fontSize:11, color:t.mut }}>{dl||"—"}</td>
                    <td style={{ padding:"10px 12px" }}><SlaTag task={tk} sla={sla}/></td>
                    <td style={{ padding:"10px 12px" }}><Av m={tk.assignee_id||tk.assignee} mbs={mbs} sz={24}/></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {filtered.length===0 && (
            <div style={{ textAlign:"center", padding:"48px 0", color:t.mut }}>
              <div style={{fontSize:32}}>📋</div>
              <div style={{fontSize:14,marginTop:8}}>Nenhuma tarefa encontrada</div>
            </div>
          )}
        </div>
      )}

      {/* FOOTER */}
      <div style={{ position:"fixed", bottom:0, left:0, right:0, background:t.navBg, borderTop:"1px solid "+t.brd, padding:"7px 16px", display:"flex", gap:16, fontSize:11, color:t.mut, fontWeight:600, flexWrap:"wrap", zIndex:10 }}>
        {COLUMNS.map(col => (
          <span key={col.id} style={{ color:col.accent }}>{col.icon} {col.name}: {tasks.filter(x=>x.column===col.id).length}</span>
        ))}
        <span style={{ marginLeft:"auto" }}>Total: {tasks.length} tarefas</span>
      </div>

      {/* MODAIS */}
      {mdl && (
        <TaskModal task={mdl} onSave={hSave} onDel={hDel} onClose={()=>setMdl(null)}
          cls={cls} mbs={mbs} t={t} onNC={hNC} sla={sla} taskTypes={taskTypes} currentUser={currentUser}/>
      )}
      {showSettings && (
        <SettingsModal onClose={()=>setShowSettings(false)} cls={cls} setCls={setCls}
          mbs={mbs} setMbs={setMbs} taskTypes={taskTypes} setTaskTypes={setTaskTypes}
          t={t} currentUser={currentUser}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
