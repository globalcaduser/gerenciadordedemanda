<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlobalCad — Teste</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0F1117;
      color: white;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    button {
      padding: 10px 16px;
      border: 0;
      border-radius: 8px;
      background: #0984E3;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    input {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #14161E;
      color: white;
      width: 280px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = "https://koetobzvkdohtmckugov.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_uhoJre1bAFZEbnZlCV05Lg_CO9Ta77J";

    let _session = null;

    const sb = {
      auth: {
        getSession: async () => {
          const stored = localStorage.getItem("sb-session");
          if (!stored) return { data: { session: null } };
          try {
            const parsed = JSON.parse(stored);
            _session = parsed;
            return { data: { session: parsed } };
          } catch (e) {
            localStorage.removeItem("sb-session");
            return { data: { session: null } };
          }
        },

        signInWithPassword: async ({ email, password }) => {
          const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": SUPABASE_ANON_KEY
            },
            body: JSON.stringify({ email, password })
          });

          const data = await r.json();

          if (!r.ok || !data.access_token) {
            return {
              data: null,
              error: { message: data.error_description || data.msg || data.error || "Credenciais inválidas" }
            };
          }

          _session = data;
          localStorage.setItem("sb-session", JSON.stringify(data));
          return { data: { session: data }, error: null };
        },

        signOut: async () => {
          _session = null;
          localStorage.removeItem("sb-session");
        }
      }
    };

    function Login({ onLoggedIn }) {
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");

      const handleLogin = async () => {
        setError("");
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
          setError(error.message);
          return;
        }
        onLoggedIn();
      };

      return (
        <div className="wrap">
          <h1>GlobalCad</h1>
          <input
            type="email"
            placeholder="E-mail"
            value={email}
            onChange={(e) => setEmail(e.target.value)}
          />
          <input
            type="password"
            placeholder="Senha"
            value={password}
            onChange={(e) => setPassword(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && handleLogin()}
          />
          <button onClick={handleLogin}>Entrar</button>
          {error ? <div style={{ color: "#ff7675" }}>{error}</div> : null}
        </div>
      );
    }

    function App() {
      const [loading, setLoading] = useState(true);
      const [session, setSession] = useState(null);

      useEffect(() => {
        sb.auth.getSession().then(({ data }) => {
          setSession(data.session);
          setLoading(false);
        });
      }, []);

      if (loading) {
        return <div className="wrap"><h2>Carregando...</h2></div>;
      }

      if (!session || !session.access_token) {
        return <Login onLoggedIn={() => window.location.reload()} />;
      }

      return (
        <div className="wrap">
          <h1>App carregou com sucesso ✅</h1>
          <div>Seu GitHub Pages está funcionando.</div>
          <button
            onClick={async () => {
              await sb.auth.signOut();
              window.location.reload();
            }}
          >
            Sair
          </button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
